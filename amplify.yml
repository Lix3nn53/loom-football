version: 1
backend:
    phases:
        build:
            commands:
                - npm ci --cache .npm --prefer-offline
                - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
    phases:
        preBuild:
            commands:
                - npm ci --cache .npm --prefer-offline
        build:
            commands:
                # Surface the generated Amplify config to the static frontend.
                - if [ -f amplify_outputs.json ]; then cp amplify_outputs.json public/amplify_outputs.json; fi
                - npm run build
    artifacts:
        baseDirectory: .next
        files:
            - "**/*"
    cache:
        paths:
            - .npm/**/*
            - node_modules/**/*
            - .next/cache/**/*
